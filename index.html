<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subdomain Takeover</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e2e2e8;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 40% 30%, rgba(220,38,38,0.06) 0%, transparent 50%);
    animation: pulse 8s ease-in-out infinite alternate;
  }
  @keyframes pulse { 0%{opacity:.5} 100%{opacity:1} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .container { position:relative;z-index:10;text-align:center; }
  .badge {
    display:inline-block;
    padding:5px 16px;
    border:1px solid #dc2626;
    border-radius:2px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:700;
    letter-spacing:3px;
    color:#dc2626;
    text-transform:uppercase;
    margin-bottom:2rem;
    animation:fadeUp .6s ease-out, blink 2s ease-in-out infinite;
  }
  .icon { margin-bottom:1.5rem; animation:fadeUp .6s ease-out .1s both; }
  .icon svg { width:56px;height:56px;stroke:#dc2626;filter:drop-shadow(0 0 16px rgba(220,38,38,0.3)); }
  h1 {
    font-size:42px;
    font-weight:700;
    color:#ffffff;
    margin-bottom:1rem;
    animation:fadeUp .6s ease-out .2s both;
  }
  .domain {
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    color:#60a5fa;
    animation:fadeUp .6s ease-out .3s both;
    margin-bottom:2.5rem;
  }
  .footer {
    font-size:12px;
    color:#4b5563;
    animation:fadeUp .6s ease-out .4s both;
  }
</style>
</head>
<body>
<div class="container">
  <div class="badge">Proof of Concept</div>
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 9v4"/><path d="M12 17h.01"/>
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>
  </div>
  <h1>This subdomain has been taken over by EY.</h1>
  <p class="domain">msoid.sans.com.sa</p>
  <p class="footer">security assessment — no malicious activity performed.</p>
</div>
</body>
</html>
